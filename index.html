<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Nexora ERP</title>

  <!-- Configuraciones para Web App (PWA) -->
  <meta name="theme-color" content="#F2F2F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nexora ERP">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="logo.png">
  
  <link rel="manifest" href="manifest.json">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800&display=swap');
    
    :root {
      var(--nexora-green): #58D073;
      var(--nexora-green-dark): #48B860;
      var(--nexora-green-light): #A3E8B2;
      --ios-bg: #F2F2F7;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--ios-bg);
      -webkit-user-select: none;
      user-select: none;
    }

    .ios-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .ios-screen {
      width: 100%;
      max-width: 390px;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease forwards;
    }

    .brand-logo-icon {
      width: 72px;
      height: 72px;
      margin-bottom: 12px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(88, 208, 115, 0.3);
      -webkit-user-drag: none;
    }

    .brand-logo-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: 0.5px;
      margin: 0 0 16px;
      text-transform: uppercase;
      text-align: center;
    }

    .ios-subtitle {
      font-size: 15px;
      color: #8E8E93;
      text-align: center;
      line-height: 1.4;
      margin: 0;
      max-width: 280px;
    }

    .ios-grouped {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.1);
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .ios-field {
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      background: #fff;
    }

    .ios-field label {
      font-size: 17px;
      color: #000;
      width: 115px;
      flex-shrink: 0;
      font-weight: 400;
    }

    .ios-field input {
      flex: 1;
      padding: 14px 0;
      font-size: 17px;
      color: #000;
      border: none;
      outline: none;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      -webkit-user-select: text;
      user-select: text;
    }

    .ios-field input::placeholder {
      color: #C7C7CC;
    }

    /* Ocultar el icono de "ojo" por defecto de navegadores como Edge/Windows */
    input::-ms-reveal,
    input::-ms-clear {
      display: none;
    }

    .ios-field input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #fff inset !important;
      -webkit-text-fill-color: #000 !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .ios-field + .ios-field::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 0;
      height: 0.5px;
      background: #C6C6C8;
    }

    .toggle-pwd {
      background: none;
      border: none;
      padding: 0 8px;
      cursor: pointer;
      color: #C7C7CC;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    
    .toggle-pwd:focus { outline: none; }

    .toggle-pwd svg {
      width: 20px;
      height: 20px;
    }

    .ios-btn {
      width: 100%;
      background: #58D073; 
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 14px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      box-shadow: 0 4px 12px rgba(88, 208, 115, 0.3);
      -webkit-touch-callout: none;
    }

    .ios-btn:active {
      background: #48B860;
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(88, 208, 115, 0.2);
    }

    .ios-btn:disabled {
      background: #A3E8B2;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .ios-error {
      font-size: 13px;
      color: #FF3B30;
      margin-top: 12px;
      padding: 0 4px;
      min-height: 18px;
      text-align: center;
      transition: opacity 0.2s;
    }

    .ios-success { color: #34C759; }

    .ios-footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #8E8E93;
    }

    .text-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #58D073;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      font-family: inherit;
    }

    .view-section {
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .view-section.active { display: block; }

    .timer-text {
      text-align: center;
      font-size: 14px;
      color: #FF9500;
      margin-top: 12px;
      font-weight: 500;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .shake { animation: shake 0.4s ease; }
    
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* HUD de Acceso Exitoso */
    .apple-hud-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .apple-hud-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .apple-hud-box {
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 150px;
      height: 150px;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .apple-hud-overlay.active .apple-hud-box {
      transform: scale(1);
    }

    .apple-hud-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 14px;
    }

    .apple-hud-text {
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
    }

    .apple-hud-check {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      stroke: #58D073; 
    }

    .apple-hud-overlay.active .apple-hud-check {
      animation: drawCheck 0.6s ease forwards 0.2s;
    }

    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body>

<!-- HUD de Acceso Exitoso -->
<div class="apple-hud-overlay" id="successHud">
  <div class="apple-hud-box">
    <svg class="apple-hud-icon" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
      <path class="apple-hud-check" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M15 27 l7 7 l16 -16"/>
    </svg>
    <div class="apple-hud-text">Acceso exitoso</div>
  </div>
</div>

<div class="ios-wrap">
  <div class="ios-screen">
    
    <div class="brand-wrap">
      <img src="logo.erp.png" alt="Logo Nexora ERP" class="brand-logo-icon">
      <div class="brand-logo-text">NEXORA ERP</div>
      <p class="ios-subtitle" id="mainSubtitle">Usa tu cuenta de Nexora ERP para acceder al portal.</p>
    </div>

    <div class="ios-error" id="globalMsg"></div>

    <!-- VISTA 1: LOGIN -->
    <div id="view-login" class="view-section active">
      <div class="ios-grouped" id="loginCard">
        <div class="ios-field">
          <label for="login-email">Correo</label>
          <input type="email" id="login-email" placeholder="nombre@ejemplo.com" autocapitalize="none" autocorrect="off" spellcheck="false">
        </div>
        <div class="ios-field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" placeholder="Obligatoria">
          <button type="button" class="toggle-pwd" onclick="togglePassword('login-pwd', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>
      <button class="ios-btn" id="btnLogin" onclick="handleLogin()">Entrar</button>
      <button class="text-link" onclick="switchView('forgot')">¿Olvidaste tu contraseña?</button>
    </div>

    <!-- VISTA 2: SOLICITAR CÓDIGO -->
    <div id="view-forgot" class="view-section">
      <div class="ios-grouped" id="forgotCard">
        <div class="ios-field">
          <label for="forgot-email">Correo</label>
          <input type="email" id="forgot-email" placeholder="Para recibir el código" autocapitalize="none">
        </div>
      </div>
      <button class="ios-btn" id="btnForgot" onclick="requestResetCode()">Enviar código</button>
      <button class="text-link" onclick="switchView('login')">Volver al inicio de sesión</button>
    </div>

    <!-- VISTA 3: RESTABLECER CONTRASEÑA -->
    <div id="view-reset" class="view-section">
      <div class="ios-grouped" id="resetCard">
        <div class="ios-field">
          <label for="reset-code">Código</label>
          <input type="text" id="reset-code" placeholder="6 dígitos" maxlength="6" inputmode="numeric" pattern="\d*">
        </div>
        <div class="ios-field">
          <label for="reset-pwd">Nueva Cont.</label>
          <input type="password" id="reset-pwd" placeholder="Mínimo 6 caracteres">
          <button type="button" class="toggle-pwd" onclick="togglePassword('reset-pwd', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>
      <div class="timer-text" id="timerDisplay">El código expira en 05:00</div>
      <button class="ios-btn" id="btnReset" onclick="submitNewPassword()">Restablecer contraseña</button>
      <button class="text-link" onclick="switchView('login')">Cancelar</button>
    </div>

    <div class="ios-footer">Nexora ERP &copy; 2026</div>
  </div>
</div>

<script>
// ==========================================
// CONFIGURACIÓN
// ==========================================
const ENCRYPTED_URL = "https://script.google.com/macros/s/AKfycbw2Sx9S3QpnBFd5SqGaP5Xu9ivW94ONbltpAY4QseHY9C5GTELt-Q5dIZOIVB_Z73VG/exec"; 

function getApiUrl() {
  return ENCRYPTED_URL;
}

let currentEmailForReset = "";
let timerInterval = null;

function togglePassword(inputId, btnElement) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btnElement.style.color = isHidden ? '#58D073' : '#C7C7CC';
  btnElement.innerHTML = isHidden
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
}

function switchView(viewName) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + viewName).classList.add('active');
  clearMsg();
}

function showMsg(text, isError = true, cardId = null) {
  const msgDiv = document.getElementById('globalMsg');
  msgDiv.textContent = text;
  msgDiv.className = isError ? 'ios-error' : 'ios-error ios-success';
  if (isError && cardId) {
    const card = document.getElementById(cardId);
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }
}

function clearMsg() {
  document.getElementById('globalMsg').textContent = '';
}

async function sendDataToScript(payload) {
  const response = await fetch(getApiUrl(), {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return JSON.parse(await response.text());
}

// ==========================================
// 1. LOGIN (VALIDA TRUE/FALSE DE LA LICENCIA)
// ==========================================
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const btn = document.getElementById('btnLogin');

  if (!email || !pwd) return showMsg('Por favor ingresa tu correo y contraseña.', true, 'loginCard');

  clearMsg();
  setBtnLoading(btn, true, 'Verificando');

  try {
    const res = await sendDataToScript({ accion: 'login', email, password: pwd });
    
    if (res.success) {
      // ✅ ACCESO CONCEDIDO (Licencia activa = TRUE)
      localStorage.setItem('userEmail', res.user);
      document.getElementById('successHud').classList.add('active');
      btn.innerHTML = 'Entrar';
      setTimeout(() => { window.location.href = res.redirectUrl; }, 1800);
      
    } else if (res.licenciaActiva === false) {
      // ⚠️ LICENCIA INACTIVA (Licencia activa = FALSE)
      showMsg(res.message, true, 'loginCard');
      btn.innerHTML = 'Entrar';
      setBtnLoading(btn, false, 'Entrar');
      // Redirigimos a la página de licencia
      setTimeout(() => { window.location.href = res.redirectUrl; }, 2500);

    } else {
      // ❌ ERROR NORMAL (Mala contraseña)
      showMsg(res.message || 'Credenciales incorrectas.', true, 'loginCard');
      setBtnLoading(btn, false, 'Entrar');
    }
  } catch (err) {
    showMsg('Error de conexión. Intenta de nuevo.', true, 'loginCard');
    setBtnLoading(btn, false, 'Entrar');
  }
}

// ==========================================
// RECUPERACIÓN (NO TOCADO - MISMA LÓGICA)
// ==========================================
async function requestResetCode() {
  const email = document.getElementById('forgot-email').value.trim();
  const btn = document.getElementById('btnForgot');
  if (!email) return showMsg('Ingresa un correo electrónico.', true, 'forgotCard');

  clearMsg();
  setBtnLoading(btn, true, 'Enviando');

  try {
    const res = await sendDataToScript({ accion: 'solicitar_codigo', email });
    if (res.success) {
      currentEmailForReset = email;
      switchView('reset');
      showMsg('Revisa tu bandeja de entrada. El código fue enviado.', false);
      startTimer(300);
    } else {
      showMsg(res.message, true, 'forgotCard');
    }
  } catch (err) {
    showMsg('Error de red.', true, 'forgotCard');
  } finally {
    setBtnLoading(btn, false, 'Enviar código');
  }
}

async function submitNewPassword() {
  const code = document.getElementById('reset-code').value.replace(/\D/g, '');
  const newPwd = document.getElementById('reset-pwd').value;
  const btn = document.getElementById('btnReset');

  if (!code || !newPwd || code.length !== 6 || newPwd.length < 6) return showMsg('Llena los campos correctamente.', true, 'resetCard');

  clearMsg();
  setBtnLoading(btn, true, 'Actualizando');

  try {
    const res = await sendDataToScript({ accion: 'restablecer_password', email: currentEmailForReset, codigo: code, nuevaPassword: newPwd });
    if (res.success) {
      clearInterval(timerInterval);
      document.getElementById('login-email').value = currentEmailForReset;
      document.getElementById('login-pwd').value = '';
      switchView('login');
      showMsg('Contraseña actualizada. Inicia sesión.', false);
    } else {
      showMsg(res.message, true, 'resetCard');
    }
  } catch (err) {
    showMsg('Error de red.', true, 'resetCard');
  } finally {
    setBtnLoading(btn, false, 'Restablecer contraseña');
  }
}

function startTimer(duration) {
  clearInterval(timerInterval);
  let timer = duration;
  const display = document.getElementById('timerDisplay');
  timerInterval = setInterval(() => {
    const min = String(Math.floor(timer / 60)).padStart(2, '0');
    const sec = String(timer % 60).padStart(2, '0');
    display.textContent = `El código expira en ${min}:${sec}`;
    if (--timer < 0) {
      clearInterval(timerInterval);
      display.textContent = 'Código expirado. Solicita otro.';
    }
  }, 1000);
}

function setBtnLoading(btnElement, isLoading, text) {
  btnElement.disabled = isLoading;
  btnElement.innerHTML = isLoading ? `${text}<span class="spinner"></span>` : text;
}
</script>
</body>
</html>
